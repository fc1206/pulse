name: scan
on:
  # Scheduling is OFF in the template on purpose: a fresh fork has no ANTHROPIC_API_KEY
  # yet, so a cron scan would just fail twice a week (and file a noisy "scan FAILED" issue).
  # Once you've run /setup and added the ANTHROPIC_API_KEY secret
  # (Settings → Secrets and variables → Actions), uncomment the schedule below to go live.
  # schedule:
  #   - cron: "0 14 * * 1,4"   # Mon + Thu 14:00 UTC ≈ 7am PT — adjust to your timezone
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  id-token: write
  pull-requests: write

concurrency:
  group: radar-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RADAR_TOKEN || github.token }}
          fetch-depth: 0   # full history so the pre-push rebase below has a base

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run /scan via Claude Code CLI
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY is not set. Add it under Settings → Secrets and variables → Actions, then re-run. (The schedule stays off until you do — see the triggers at the top of this file.)"
            exit 1
          fi
          npm install -g @anthropic-ai/claude-code
          set -o pipefail   # without this, the tee pipe would mask a claude failure as success
          # stream-json keeps a live event log AND ends with a machine-readable result line
          # carrying total_cost_usd + usage — the capture step below extracts it.
          claude -p "/scan" \
            --model "${{ vars.SCAN_MODEL || 'claude-sonnet-4-6' }}" \
            --dangerously-skip-permissions \
            --output-format stream-json \
            --verbose 2>&1 | tee /tmp/scan.log

      - name: Post-run health check (catch silent degradation)
        run: |
          # Expect TODAY's run dir specifically. Deriving --expect-date from the newest
          # existing dir would let an exit-0 no-op scan re-validate the previous run and
          # report HEALTHY. (Cron fires 14:00 UTC with a 30-min timeout, so a scan never
          # crosses UTC midnight.)
          TODAY=$(date -u +%F)
          if [ ! -d "runs/$TODAY" ]; then
            echo "::error::scan produced no runs/$TODAY directory — the model exited without running the pipeline. Check the scan log."; exit 1
          fi
          python3 scripts/check_run_health.py --run-dir "runs/$TODAY" --expect-date "$TODAY"

      - name: Capture cost + token usage into run dir
        run: |
          # The scan log's last {"type":"result"} line carries total_cost_usd + usage.
          # Parse JSON properly (spacing-agnostic) rather than grepping a serialization.
          # Runs after the health check so the dir is guaranteed; committed by the publish step.
          python3 -c "
          import json
          last = {}
          for ln in open('/tmp/scan.log', encoding='utf-8', errors='replace'):
              ln = ln.strip()
              if not ln.startswith('{'):
                  continue
              try:
                  d = json.loads(ln)
              except Exception:
                  continue
              if d.get('type') == 'result':
                  last = d
          keep = {k: last.get(k) for k in ('total_cost_usd', 'num_turns', 'duration_ms', 'usage', 'modelUsage')}
          print(json.dumps(keep, indent=1))
          " > "runs/$(date -u +%F)/usage.log" || true

      - name: Render HTML report
        run: python3 scripts/render_report.py

      - name: Publish scan results (direct push; PR fallback if rules require)
        env:
          GH_TOKEN: ${{ secrets.RADAR_TOKEN || github.token }}
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes produced by this scan."; exit 0
          fi
          DATE=$(date -u +%F)
          git commit -m "scan: ${DATE} (github)"
          # Rebase onto any commit that landed on main since checkout (the merge is
          # idempotent) so a concurrent workflow_dispatch/human commit can't bounce this
          # scan on a stale-tip push. A conflicting rebase aborts and falls to the PR flow.
          git pull --rebase origin main || git rebase --abort || true
          if git push origin HEAD:main; then
            echo "Pushed directly to main."; exit 0
          fi
          echo "Direct push rejected — falling back to PR flow."
          BRANCH="scan/${DATE}-$(date -u +%H%M%S)"
          git checkout -b "$BRANCH"
          git push -u origin "$BRANCH"
          {
            echo "Automated radar scan ${DATE}."
            echo
            echo '```'
            tail -n 12 data/SCANLOG.md
            echo '```'
            LATEST=$(ls -d runs/*/ 2>/dev/null | sort | tail -1)
            if [ -n "$LATEST" ] && [ -f "${LATEST}ESCALATION.md" ]; then
              echo; echo "## ⚠ ESCALATION"; echo; cat "${LATEST}ESCALATION.md"
            fi
          } > /tmp/pr_body.md
          gh pr create --base main --head "$BRANCH" --title "scan: ${DATE}" --body-file /tmp/pr_body.md
          gh pr merge "$BRANCH" --squash --delete-branch \
            || gh pr merge "$BRANCH" --squash --delete-branch --auto \
            || echo "::warning::Scan PR left open — repo rules require manual merge. Merge promptly to keep scans linear."

      - name: Post digest as GitHub Issue (zero-config delivery)
        env:
          GH_TOKEN: ${{ secrets.RADAR_TOKEN || github.token }}
        run: |
          # Default delivery channel: needs no secret, and GitHub notifies the owner natively.
          # Slack/email stay as optional upgrades; this guarantees a scan is never silent.
          TODAY=$(date -u +%F)
          [ -f "runs/$TODAY/digest.md" ] || { echo "no digest for $TODAY — skipping"; exit 0; }
          TITLE="$(python3 -c "import json;b=json.load(open('config/brand.json'));print(b.get('product') or b.get('company') or 'Pulse')" 2>/dev/null || echo Pulse)"
          # Supersede the previous digest issue so the open list is always exactly one deep.
          for n in $(gh issue list --state open --search 'digest in:title' --json number --jq '.[].number'); do
            gh issue close "$n" --comment "Superseded by the ${TODAY} digest." || true
          done
          {
            cat "runs/$TODAY/digest.md"
            echo; echo "---"
            echo "[Digest history](https://github.com/${{ github.repository }}/blob/main/data/DIGEST.md) · [scan log](https://github.com/${{ github.repository }}/blob/main/data/SCANLOG.md) · close this issue once read."
          } > /tmp/digest_issue.md
          gh issue create --title "${TITLE} digest — ${TODAY}" --body-file /tmp/digest_issue.md \
            || echo "::warning::digest issue creation failed (scan itself succeeded)"

      - name: Email report
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          # Brand the subject/attachment from config/brand.json (setup.md promises this).
          # Never empty — the scripts treat "" as a real title, so fall back to Pulse on any failure.
          export RADAR_TITLE="$(python3 -c "import json;b=json.load(open('config/brand.json'));print(b.get('product') or b.get('company') or 'Pulse')" 2>/dev/null || echo Pulse)"
          python3 scripts/send_report.py || echo "::warning::email send failed (scan itself succeeded)"

      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RADAR_REPO: ${{ github.repository }}   # link base for the report/digest/landscape links
        run: |
          # Brand the Slack title from config/brand.json — same derivation as the email step.
          export RADAR_TITLE="$(python3 -c "import json;b=json.load(open('config/brand.json'));print(b.get('product') or b.get('company') or 'Pulse')" 2>/dev/null || echo Pulse)"
          python3 scripts/notify_slack.py || echo "::warning::slack notify failed (scan itself succeeded)"

      - name: Heartbeat — scan alive (dead-man switch)
        env:
          HEARTBEAT_URL: ${{ secrets.HEARTBEAT_URL }}
        run: python3 scripts/heartbeat.py --status success || echo "::warning::heartbeat failed (scan itself succeeded)"

      - name: Open issue on new Tier 1
        env:
          GH_TOKEN: ${{ secrets.RADAR_TOKEN || github.token }}
        run: |
          latest=$(ls -d runs/*/ 2>/dev/null | sort | tail -1)
          if [ -n "$latest" ] && [ -f "${latest}ESCALATION.md" ]; then
            if [ "$(basename $latest)" = "$(date -u +%F)" ]; then
              gh issue create --title "⚠ Radar: new Tier-1 competitor ($(date -u +%F))" --body-file "${latest}ESCALATION.md"
            fi
          fi

      - name: Close stale failure alerts (this scan succeeded)
        env:
          GH_TOKEN: ${{ secrets.RADAR_TOKEN || github.token }}
        run: |
          # A successful scan resolves any past "Radar scan FAILED" alert — don't let a
          # transient blip (usually API-credit exhaustion) linger as a false live failure.
          for n in $(gh issue list --state open --search 'Radar scan FAILED in:title' --json number --jq '.[].number'); do
            gh issue close "$n" --comment "Auto-closed: scan succeeded on $(date -u +%F). The earlier failure was transient." || true
          done

      - name: Flag failed run
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.RADAR_TOKEN || github.token }}
        run: |
          DATE=$(date -u +%F)
          # Classify the failure — credit exhaustion is the #1 real cause and is NOT a code bug.
          REASON="The scheduled scan did not complete. Check the Actions log."
          if grep -qi 'credit balance is too low' /tmp/scan.log 2>/dev/null; then
            REASON="**API credit balance exhausted** — the Anthropic account ran out of credits, so the scan model never ran (not a code bug). Top up / enable auto-reload on the Anthropic account, then re-dispatch the scan."
          fi
          # De-dupe: comment on the existing open alert rather than stacking a new issue each cycle.
          existing=$(gh issue list --state open --search 'Radar scan FAILED in:title' --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Failed again ${DATE}. ${REASON}" || true
          else
            gh issue create --title "Radar scan FAILED (${DATE})" --body "${REASON} A silent radar is a blind radar — fix before the next cycle." || true
          fi

      - name: Heartbeat — signal failure (dead-man switch)
        if: failure()
        env:
          HEARTBEAT_URL: ${{ secrets.HEARTBEAT_URL }}
        run: python3 scripts/heartbeat.py --status fail || true
